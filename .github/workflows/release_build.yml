name: Release Build (arm64-v8a only)

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v6

      - name: Setup java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate keystore for release signing
        run: |
          keytool -genkey -v -noprompt \
            -alias alias \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -keystore app/testkey_untrusted.jks \
            -storepass xrj45yWGLbsO7W0v \
            -keypass xrj45yWGLbsO7W0v \
            -dname "CN=Termux, OU=Termux, O=Termux, L=Unknown, ST=Unknown, C=XX"

      - name: Configure release signing
        run: |
          echo '' >> app/build.gradle
          echo 'android.buildTypes.release.signingConfig android.signingConfigs.debug' >> app/build.gradle

      - name: Build Release APK
        run: |
          set -e
          CURRENT_VERSION_NAME=$(grep -m 1 -E '\s+versionName "([^"]+)"$' ./app/build.gradle | sed -r 's/\s+versionName "([^"]+)"$/\1/')
          RELEASE_VERSION_NAME="v${CURRENT_VERSION_NAME#}${GITHUB_SHA:0:7}"

          export TERMUX_APP_VERSION_NAME="${RELEASE_VERSION_NAME/v/}"
          export TERMUX_APK_VERSION_TAG="${RELEASE_VERSION_NAME}-apt-android-7-github-release"
          export TERMUX_PACKAGE_VARIANT="apt-android-7"
          export TERMUX_SPLIT_APKS_FOR_RELEASE_BUILDS="1"

          echo "APK_VERSION_TAG=${TERMUX_APK_VERSION_TAG}" >> $GITHUB_ENV

          ./gradlew assembleRelease

      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v6
        with:
          name: termux-app_${{ env.APK_VERSION_TAG }}_arm64-v8a
          path: app/build/outputs/apk/release/*arm64-v8a*.apk
          if-no-files-found: error
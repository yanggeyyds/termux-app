name: Release Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Release APK
        run: |
          sed -i '/release {/a\            signingConfig signingConfigs.debug' app/build.gradle
          CURRENT_VERSION=$(grep -m 1 versionName app/build.gradle | grep -o '"[^"]*"' | tr -d '"')
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          VERSION="vd{CURRENT_VERSION}+${SHORT_SHA}"
          export TERMUX_APP_VERSION_NAME="${VERSION/v/}"
          export TERMUX_APK_VERSION_TAG="${VERSION}-apt-android-7-github-release"
          export TERMUX_PACKAGE_VARIANT="apt-android-7"
          export TERMUX_SPLIT_APKS_FOR_RELEASE_BUILDS="1"
          echo "APD_TAG=${TERMUX_APK_VERSION_TAG}" >> $GITHUB_ENV
          ./gradlew downloadBootstraps assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: termux-app_${{ env.APK_TAG }}_arm64-v8a
          path: app/build/outputs/apk/release/*arm64-v8a*.apk
          if-no-files-found: error